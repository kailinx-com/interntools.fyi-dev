services:
  web:
    image: node:20
    container_name: interntools-web
    working_dir: /workspace/apps/web
    depends_on:
      api:
        condition: service_started
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8080/api
    ports:
      - "3000:3000"
    volumes:
      - .:/workspace
      - web-node-modules:/workspace/apps/web/node_modules
    command: sh -c "corepack enable && pnpm install && pnpm dev"

  api:
    image: maven:3.9-eclipse-temurin-21
    container_name: interntools-api
    working_dir: /workspace/apps/api
    depends_on:
      db:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    env_file:
      - ./.env
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/interntools_dev
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD}
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT: org.hibernate.dialect.PostgreSQLDialect
      SPRING_DATA_MONGODB_HOST: mongodb
      SPRING_DATA_MONGODB_PORT: 27017
      SPRING_DATA_MONGODB_DATABASE: ${MONGO_DB}
      SPRING_DATA_MONGODB_USERNAME: ${MONGO_INITDB_ROOT_USERNAME}
      SPRING_DATA_MONGODB_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}
      SPRING_DATA_MONGODB_AUTHENTICATION_DATABASE: admin
      SPRING_MONGODB_HOST: mongodb
      SPRING_MONGODB_PORT: 27017
      SPRING_MONGODB_DATABASE: ${MONGO_DB}
      SPRING_MONGODB_USERNAME: ${MONGO_INITDB_ROOT_USERNAME}
      SPRING_MONGODB_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}
      SPRING_MONGODB_AUTHENTICATION_DATABASE: admin
      # Optional: override server port if needed
      # SERVER_PORT: 8080
    ports:
      - "8080:8080"
    volumes:
      - .:/workspace
      - maven-cache:/root/.m2
    command: ./mvnw spring-boot:run

  db:
    image: postgres:16
    container_name: interntools-postgres
    restart: unless-stopped
    env_file:
      - ./.env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5433:5432"
    volumes:
      - ./infra/postgres/data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U interntools -d interntools_dev"]
      interval: 5s
      timeout: 5s
      retries: 10

  mongodb:
    image: mongo:7
    container_name: interntools-mongodb
    restart: unless-stopped
    env_file:
      - ./.env
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}
      MONGO_INITDB_DATABASE: ${MONGO_DB}
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mongosh --quiet --eval \"db.adminCommand('ping').ok\" --username $$MONGO_INITDB_ROOT_USERNAME --password $$MONGO_INITDB_ROOT_PASSWORD --authenticationDatabase admin | grep 1",
        ]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  maven-cache:
  web-node-modules:
  mongo-data:
