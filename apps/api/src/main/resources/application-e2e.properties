# Profile for local Playwright E2E: in-memory H2, no Mongo (planner APIs optional on frontend).
spring.datasource.url=jdbc:h2:mem:e2e;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

spring.h2.console.enabled=false
# Spring Boot 4 reorganised MongoDB autoconfigure into two modules; exclude everything from both.
# spring-boot-mongodb: MongoClient and reactive/health/metrics wiring
# spring-boot-data-mongodb: MongoTemplate, repositories (imperative and reactive)
spring.autoconfigure.exclude=\
  org.springframework.boot.mongodb.autoconfigure.MongoAutoConfiguration,\
  org.springframework.boot.mongodb.autoconfigure.MongoReactiveAutoConfiguration,\
  org.springframework.boot.mongodb.autoconfigure.health.MongoHealthContributorAutoConfiguration,\
  org.springframework.boot.mongodb.autoconfigure.health.MongoReactiveHealthContributorAutoConfiguration,\
  org.springframework.boot.mongodb.autoconfigure.metrics.MongoMetricsAutoConfiguration,\
  org.springframework.boot.data.mongodb.autoconfigure.DataMongoAutoConfiguration,\
  org.springframework.boot.data.mongodb.autoconfigure.DataMongoReactiveAutoConfiguration,\
  org.springframework.boot.data.mongodb.autoconfigure.DataMongoRepositoriesAutoConfiguration,\
  org.springframework.boot.data.mongodb.autoconfigure.DataMongoReactiveRepositoriesAutoConfiguration
# Spring Boot 4 property (replaces the SB3 repositories.enabled=false)
spring.data.mongodb.repositories.type=none

app.jwt.secret=0123456789abcdef0123456789abcdef
app.jwt.expiration-ms=86400000
