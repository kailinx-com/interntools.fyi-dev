# Local runs can read env from apps/api/.env or from repo-root .env.
spring.config.import=optional:file:.env[.properties],optional:file:../../.env[.properties]
spring.application.name=api
# API served at /api
server.servlet.context-path=/api
# Fixed user for local dev (configured via env; do not hardcode secrets here)
spring.security.user.name=${SPRING_SECURITY_USER_NAME:user}
spring.security.user.password=${SPRING_SECURITY_USER_PASSWORD:password}
# PostgreSQL datasource (real DB)
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
# Disable H2 console when using Postgres
spring.h2.console.enabled=false
# MongoDB (planner docs and other document-style payloads)
spring.data.mongodb.host=${SPRING_DATA_MONGODB_HOST:localhost}
spring.data.mongodb.port=${SPRING_DATA_MONGODB_PORT:27017}
spring.data.mongodb.database=${SPRING_DATA_MONGODB_DATABASE:interntools_dev}
spring.data.mongodb.username=${SPRING_DATA_MONGODB_USERNAME:}
spring.data.mongodb.password=${SPRING_DATA_MONGODB_PASSWORD:}
spring.data.mongodb.authentication-database=${SPRING_DATA_MONGODB_AUTHENTICATION_DATABASE:admin}
# Spring Boot 4 also supports the `spring.mongodb.*` namespace.
spring.mongodb.host=${SPRING_MONGODB_HOST:${SPRING_DATA_MONGODB_HOST:localhost}}
spring.mongodb.port=${SPRING_MONGODB_PORT:${SPRING_DATA_MONGODB_PORT:27017}}
spring.mongodb.database=${SPRING_MONGODB_DATABASE:${SPRING_DATA_MONGODB_DATABASE:interntools_dev}}
spring.mongodb.username=${SPRING_MONGODB_USERNAME:${SPRING_DATA_MONGODB_USERNAME:}}
spring.mongodb.password=${SPRING_MONGODB_PASSWORD:${SPRING_DATA_MONGODB_PASSWORD:}}
spring.mongodb.authentication-database=${SPRING_MONGODB_AUTHENTICATION_DATABASE:${SPRING_DATA_MONGODB_AUTHENTICATION_DATABASE:admin}}
# JWT
app.jwt.secret=${APP_JWT_SECRET}
app.jwt.expiration-ms=${APP_JWT_EXPIRATION_MS:86400000}
